<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SentinelAI | Pro Guard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛡️ Sentinel<span>AI</span> Pro</h1>
            <p>Advanced Content Security Dashboard</p>
        </header>

        <form action="/scan" method="POST">
            <textarea name="content" placeholder="Paste text or links to analyze..." required>{{ original }}</textarea>
            
            <div class="stats-row">
                <span>Words: {{ words if words else 0 }}</span>
                <span>Characters: {{ chars if chars else 0 }}</span>
            </div>
            
            <button type="submit">Run Security Scan</button>
        </form>

        {% if result %}
        <div class="result-card {{ status }}">
            <h3>{{ result }}</h3>
            <p>Safety Score: {{ safety }}%</p>
            <div class="progress-bar">
                <div class="progress" style="width: {{ safety }}%"></div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
